name: CI/CD — Supply Chain Risk API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/supply-chain-risk-api

jobs:
  # ── 1. Lint & Test ────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Download model from release (or use artifact)
        # In production, pull the model from your model registry or release asset.
        # Here we check it's present (already in repo for demo).
        run: test -f backend/app/models/risk_prediction_model.pkl

      - name: Lint with ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Run tests
        working-directory: backend
        env:
          MODEL_PATH: app/models/risk_prediction_model.pkl
          SECRET_KEY: test-secret-key
          DATABASE_URL: sqlite:///./test.db
        run: pytest tests/ -v --tb=short

  # ── 2. Build & Push Docker Image ──────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/supply-chain-risk
            docker compose pull api
            docker compose up -d --no-deps api
            docker system prune -f
